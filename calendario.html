<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendário</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f4f6f9;
    }
    .cal {
      background: #fff;
      border: 2px solid #1B3A7A;
      border-radius: 24px;
      padding: 2rem 1.5rem;
      width: 420px;
      user-select: none;
    }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .nav button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 24px;
      color: #888;
      padding: 4px 10px;
      line-height: 1;
    }
    .nav button:hover { color: #333; }
    .nav h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: .04em;
    }
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .dow {
      text-align: center;
      font-size: 13px;
      color: #bbb;
      padding: 0 0 10px;
      font-weight: 400;
    }
    .cell-wrap {
      position: relative;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .row-bg {
      position: absolute;
      top: 8px;
      bottom: 8px;
      left: 0;
      right: 0;
      background: #D6EBF9;
      pointer-events: none;
    }
    .cell {
      position: relative;
      z-index: 2;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 16px;
      cursor: default;
      color: #222;
      transition: background .12s;
    }
    .cell.empty { color: transparent; pointer-events: none; }
    .cell.endpoint { background: #1B3A7A; color: #fff; font-weight: 500; }
    .cell.holiday { color: #C0392B; }
    .cell.endpoint.holiday { color: #fff; }

    #tip {
      position: fixed;
      background: #1a1a1a;
      color: #fff;
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 5px 10px;
      border-radius: 8px;
      pointer-events: none;
      white-space: nowrap;
      display: none;
      z-index: 999;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>

<div id="tip"></div>
<div class="cal">
  <div class="nav">
    <button id="prev">&#8592;</button>
    <h2 id="title"></h2>
    <button id="next">&#8594;</button>
  </div>
  <div class="grid" id="dow"></div>
  <div class="grid" id="days"></div>
</div>

<script>
  const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const DOWS   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const tip    = document.getElementById('tip');
  const today  = new Date();

  function getHolidays(year) {
    const h = {};
    function add(m, d, name) { h[year * 10000 + m * 100 + d] = name; }
    add(1,  1,  'Confraternização Universal');
    add(4,  21, 'Tiradentes');
    add(5,  1,  'Dia do Trabalho');
    add(9,  7,  'Independência do Brasil');
    add(10, 12, 'Nossa Sra. Aparecida');
    add(11, 2,  'Finados');
    add(11, 15, 'Proclamação da República');
    add(11, 20, 'Consciência Negra');
    add(12, 25, 'Natal');

    function easter(y) {
      const a = y % 19, b = Math.floor(y / 100), c = y % 100;
      const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
      const g = Math.floor((b - f + 1) / 3), hh = (19 * a + b - d - g + 15) % 30;
      const i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - hh - k) % 7;
      const m2 = Math.floor((a + 11 * hh + 22 * l) / 451);
      return new Date(y, Math.floor((hh + l - 7 * m2 + 114) / 31) - 1, ((hh + l - 7 * m2 + 114) % 31) + 1);
    }
    const e = easter(year);
    function ao(o, n) {
      const d2 = new Date(e);
      d2.setDate(d2.getDate() + o);
      add(d2.getMonth() + 1, d2.getDate(), n);
    }
    ao(-48, 'Carnaval (2ª)');
    ao(-47, 'Carnaval (3ª)');
    ao(-2,  'Sexta-feira Santa');
    ao(0,   'Páscoa');
    ao(60,  'Corpus Christi');
    return h;
  }

  let cur = new Date(); cur.setDate(1);

  document.getElementById('dow').innerHTML = DOWS.map(d => `<div class="dow">${d}</div>`).join('');

  function dk(d)       { return d ? d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate() : null; }
  function same(a, b)  { return a && b && dk(a) === dk(b); }
  function btw(d, a, b){
    if (!a || !b) return false;
    const k = dk(d), ka = dk(a), kb = dk(b);
    return ka < kb ? k > ka && k < kb : k > kb && k < ka;
  }

  function getAutoRange(year, month) {
    const isCurrentMonth = year === today.getFullYear() && month === today.getMonth();
    const startDay = isCurrentMonth ? today.getDate() : 1;
    const lastDay  = new Date(year, month + 1, 0).getDate();
    return { st: new Date(year, month, startDay), en: new Date(year, month, lastDay) };
  }

  function render() {
    const year  = cur.getFullYear(), month = cur.getMonth();
    document.getElementById('title').textContent = MONTHS[month] + '   ' + year;
    const holidays = getHolidays(year);
    const first    = new Date(year, month, 1).getDay();
    const dim      = new Date(year, month + 1, 0).getDate();
    const daysEl   = document.getElementById('days');
    daysEl.innerHTML = '';

    const { st, en } = getAutoRange(year, month);
    const rows = Math.ceil((first + dim) / 7);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < 7; c++) {
        const dn   = r * 7 + c - first + 1;
        const wrap = document.createElement('div');
        wrap.className = 'cell-wrap';
        const cell = document.createElement('div');
        const valid = dn >= 1 && dn <= dim;
        cell.className  = 'cell' + (valid ? '' : ' empty');
        cell.textContent = valid ? dn : '';

        if (valid) {
          const d      = new Date(year, month, dn);
          const hname  = holidays[dk(d)];
          const isStart = same(d, st), isEnd = same(d, en), inRange = btw(d, st, en);

          if (isStart || isEnd) cell.classList.add('endpoint');
          if (hname) { cell.classList.add('holiday'); cell.dataset.holiday = hname; }

          if (inRange || isStart || isEnd) {
            const bg   = document.createElement('div');
            bg.className = 'row-bg';
            const isF  = c === 0 || dn === 1;
            const isL  = c === 6 || dn === dim;
            if (isStart && isEnd) {
              bg.style.display = 'none';
            } else if (isStart) {
              bg.style.left = '50%'; bg.style.right = '0';
              bg.style.borderRadius = isL ? '0 20px 20px 0' : '0';
            } else if (isEnd) {
              bg.style.left = '0'; bg.style.right = '50%';
              bg.style.borderRadius = isF ? '20px 0 0 20px' : '0';
            } else {
              if      (isF && isL) bg.style.borderRadius = '20px';
              else if (isF)        bg.style.borderRadius = '20px 0 0 20px';
              else if (isL)        bg.style.borderRadius = '0 20px 20px 0';
              else                 bg.style.borderRadius = '0';
            }
            wrap.appendChild(bg);
          }

          cell.addEventListener('mouseenter', () => {
            if (cell.dataset.holiday) { tip.textContent = cell.dataset.holiday; tip.style.display = 'block'; }
          });
          cell.addEventListener('mousemove', ev => {
            if (cell.dataset.holiday) { tip.style.left = ev.clientX + 'px'; tip.style.top = (ev.clientY - 36) + 'px'; }
          });
          cell.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
        }

        wrap.appendChild(cell);
        daysEl.appendChild(wrap);
      }
    }
  }

  document.getElementById('prev').addEventListener('click', () => { cur.setMonth(cur.getMonth() - 1); render(); });
  document.getElementById('next').addEventListener('click', () => { cur.setMonth(cur.getMonth() + 1); render(); });
  render();
</script>
</body>
</html>
